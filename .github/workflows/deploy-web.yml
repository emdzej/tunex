name: Deploy web to GitHub Pages

# Manual trigger only — surface in the Actions tab and let a
# maintainer click "Run workflow" when ready to publish. No auto-deploy
# on push by design; the site shouldn't move on every commit.
on:
  workflow_dispatch:

# Required by `actions/deploy-pages`: read the repo, write the Pages
# artifact, and mint an OIDC token so the deployment is attested to
# come from this workflow run.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time — let an in-flight deploy finish
# instead of cancelling it (cancelling mid-deploy can leave Pages in a
# half-published state).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Custom domain (tunex.bimmerz.app) is served from the root —
      # leave Vite's base at the default "/" and ship a CNAME at the
      # site root so Pages knows which repo to map the host onto.
      - name: Build
        run: pnpm --filter @tunex/web... build

      - name: Add CNAME
        run: echo "tunex.bimmerz.app" > apps/web/dist/CNAME

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
